services:
  elyria-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: elyria-verita-production-candidate
    env_file:
      - ./.env.production
    ports:
      - "8080:8080"
    volumes:
      - ../runtime:/app/runtime
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/ready').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
